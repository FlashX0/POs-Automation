<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POs Automation System by Khaled</title>
    <link rel="icon" type="image/jpeg" href="/src/assets/images/delta_road_logo_1781798697279.jpg" />
    <script>
      // Make window.fetch writable to prevent TypeError: Cannot set property fetch of #<Window> which has only a getter
      // This happens when third-party libraries or platform sandboxes try to monkeypatch or proxy window.fetch
      (function() {
        try {
          var _nativeFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return _nativeFetch;
            },
            set: function(val) {
              _nativeFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to patch window.fetch property descriptor:', e);
        }
      })();

      // Automatically silence expected, benign development WebSocket and Vite HMR connection failures
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason) {
          const reasonStr = typeof event.reason === 'string' 
            ? event.reason 
            : (event.reason.message || event.reason.toString() || '');
          if (/websocket|web\s?socket|vite-hmr|failed\s+to\s+connect/i.test(reasonStr)) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            console.debug('Quietly handled sandbox-iframe websocket rejection:', reasonStr);
          }
        }
      }, true);

      window.addEventListener('error', function(event) {
        const errorMsg = event.message || '';
        if (/websocket|web\s?socket|vite-hmr|failed\s+to\s+connect/i.test(errorMsg)) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          console.debug('Quietly handled sandbox-iframe websocket error:', errorMsg);
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
